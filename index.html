    .header {
      background-color: #fff;

      position: fixed;
      width: 100%;
      z-index: 3;
      transition: transform 0.3s ease-in-out;
    }

    span {
      border-bottom: 2px solid white;
      animation: blink 1s step-end infinite;
      font-family: "JetBrains Mono", monospace;
    }

    @keyframes blink {

      from,
      to {
        border-color: transparent;
      }

      50% {
        border-color: rgb(255, 0, 255);
      }
    }


    .header.hidden {
      transform: translateY(-100%);
    }

    .buttonMenu {
      cursor: pointer;
      background: none;
      border: 0;
      color: inherit;
    }

    .header ul {
      margin: 0;
      padding: 0;
      list-style: none;
      overflow: hidden;

    }

    .header li a {
      display: block;
      padding: 20px 20px;
      text-decoration: none;
    }

    .header .logo {
      font-weight: bold;
      display: block;
      float: left;
      padding: 20px 20px;
      text-decoration: none;
    }


    .header .menu {
      clear: both;
      max-height: 0;
      transition: max-height .2s ease-in-out;

    }

    .bar-menu {
      padding: 14px 18px 0px 0px;
    }


    @media (min-width: 1146px) {
      .header li {
        float: left;
      }

      .header li a {
        padding: 20px 30px;
      }

      .header .menu {
        clear: none;
        float: right;
        max-height: none;
      }

      .buttonMenu {
        visibility: hidden;
      }

    }
  </style>

<script>
  const menuList = document.getElementById("menu");
  const toggleButton = document.getElementById("buttonMenu");

  function toggleOverflow() {
    if (menuList.style.overflow === "visible") {
      menuList.style.overflow = "hidden";
    } else {
      menuList.style.overflow = "visible";
    }
  }

  toggleButton.addEventListener("click", toggleOverflow);


  let prevScrollPos = window.pageYOffset;
  const header = document.querySelector('.header');

  window.addEventListener('scroll', () => {
    const currentScrollPos = window.pageYOffset;
    if (prevScrollPos > currentScrollPos) {
      header.classList.remove('hidden');
    } else {
      header.classList.add('hidden');
    }
    prevScrollPos = currentScrollPos;
  });


  function scrollToContainerSkills(event) {
    toggleOverflow();
    event.preventDefault();
    var container = document.getElementById("block2");
    container.scrollIntoView({ behavior: 'smooth' });
  }
  function scrollToContainerProjects(event) {
    toggleOverflow();
    event.preventDefault();
    var container = document.getElementById("block4");
    container.scrollIntoView({ behavior: 'smooth' });
  }
  function scrollToContainerServices(event) {
    toggleOverflow();
    event.preventDefault();
    var container = document.getElementById("serv");
    container.scrollIntoView({ behavior: 'smooth' });
  }
  function scrollToContainerContact(event) {
    toggleOverflow();
    event.preventDefault();
    var container = document.getElementById("block7");
    container.scrollIntoView({ behavior: 'smooth' });
  }
</script>
<script>
  const themeBtn = document.getElementById('theme-btn');
  const headera = document.getElementById('header');

  const currentTheme = localStorage.getItem('theme');


  if (currentTheme) {
    applyTheme(currentTheme);
  }

    if (theme === 'dark') {

      document.getElementById('insta').src = "Images/imgLogos/InstagramW.webp";

      document.getElementById('yout').src = "Images/imgLogos/YoutubeW.webp";
      document.getElementById('linke').src = "Images/imgLogos/LinkedinW.webp";

      //Loops-TagName
      for (let i = 0; i < footer.length; i++) {
        footer[i].style.backgroundColor = 'black';
        footer[i].style.color = 'white';
      }
      for (let i = 0; i < body.length; i++) {

  themeBtn.addEventListener('click', function () {

      applyTheme('light');

      applyTheme('dark');
      localStorage.setItem('theme', 'dark');
    }
  });
  document.addEventListener("DOMContentLoaded", function () {
    const currentTheme = localStorage.getItem("theme");
    if (currentTheme) {
      applyTheme(currentTheme);
    } else {
      applyTheme("light");

  });

    document.getElementById('pr6').innerText = languageData.projects.pr6;

    document.getElementById('quote-title').innerText = languageData.quote.title;
    document.getElementById('quote-text').innerText = languageData.quote.text;

    document.getElementById('servicees').innerText = languageData.servicess.title;
    document.getElementById('s1').innerText = languageData.servicess.s1;

    if (botonElement.textContent === 'ES') {
      botonElement.style.backgroundColor = '#2cb67d';
      botonElement.style.color = 'white';
    } if (botonElement.textContent === 'EN') {
      botonElement.style.backgroundColor = '#7f5af0';
      botonElement.style.color = 'white';
    }
  }


  // Check local storage for language preference on page load
  document.addEventListener("DOMContentLoaded", async () => {
    const selectedLanguage = localStorage.getItem('language') || 'en';
    const response = await fetch('JS/text.json');
    const jsonData = await response.json();

    changeLanguage(selectedLanguage, jsonData);
  });

  const languageBtn = document.getElementById('boton');
  languageBtn.addEventListener('click', async () => {
    const currentLanguage = languageBtn.textContent;
    const newLanguage = currentLanguage === 'ES' ? 'en' : 'es';
    const response = await fetch('JS/text.json');
    const jsonData = await response.json();

    changeLanguage(newLanguage, jsonData);
    toggleOverflow();
  });
</script>
